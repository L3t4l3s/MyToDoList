[pytest]
testpaths = tests
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
log_cli = true
log_cli_level = WARNING
addopts =
    --tb=short
    -q
    -m "not live"
markers =
    unit: pure logic tests, no HA instance needed (fast)
    integration: tests that require an in-memory HA instance (pytest-hacc)
    e2e: end-to-end WS command-chain tests in an in-memory HA instance
    live: opt-in live integration test against a real HA instance
    live_websocket: requires HT_HA_URL, HT_HA_TOKEN, HT_NATIVE_LIST_NAME
    live_websocket_two_lists: also requires HT_NATIVE_LIST_NAME_2
    live_todoist: requires HT_TODOIST_TEST_ENTITY
    live_google_tasks: requires HT_GOOGLE_TASKS_TEST_ENTITY
    live_caldav: requires HT_CALDAV_TEST_ENTITY
    live_local_todo: requires HT_LOCAL_TODO_TEST_ENTITY
    live_local_todo_external: requires HT_LOCAL_TODO_EXTERNAL_TEST_ENTITY
    live_bring: requires HT_BRING_TEST_ENTITY
